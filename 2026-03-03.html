<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黑猫的AI每日报 | 2026-03-03</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--neon-blue:#00f5ff;--neon-pink:#ff6b9d;--neon-purple:#b829dd;--dark-bg:#0a0a0f;--card-bg:rgba(20,20,35,0.8);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--dark-bg);min-height:100vh;padding:40px 20px;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,rgba(0,245,255,0.03) 1px,transparent 1px),linear-gradient(rgba(0,245,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:-1;}
.container{max-width:900px;margin:0 auto;}
.nav{text-align:center;margin-bottom:30px;}
.nav a{color:var(--neon-blue);text-decoration:none;font-family:'Orbitron',monospace;font-size:0.9rem;letter-spacing:2px;opacity:0.8;transition:all 0.3s;}
.nav a:hover{opacity:1;text-shadow:0 0 20px var(--neon-blue);}
.header{text-align:center;margin-bottom:50px;position:relative;}
.header::before{content:'';position:absolute;top:-20px;left:50%;transform:translateX(-50%);width:200px;height:2px;background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);}
.cat-avatar{width:120px;height:120px;margin:0 auto 20px;border-radius:50%;border:3px solid var(--neon-blue);box-shadow:0 0 30px rgba(0,245,255,0.4);animation:catGlow 3s ease-in-out infinite;object-fit:cover;}
@keyframes catGlow{0%,100%{box-shadow:0 0 30px rgba(0,245,255,0.4);}50%{box-shadow:0 0 50px rgba(0,245,255,0.7);}}
.header h1{font-family:'Orbitron','Noto Sans SC',sans-serif;font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--neon-blue) 0%,var(--neon-pink) 50%,var(--neon-purple) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;margin-bottom:15px;}
.header .date{font-family:'Orbitron',monospace;font-size:1rem;color:var(--neon-blue);opacity:0.8;letter-spacing:3px;}
.summary-box{background:var(--card-bg);border:1px solid rgba(0,245,255,0.3);border-radius:16px;padding:28px;margin-bottom:40px;box-shadow:0 0 40px rgba(0,245,255,0.1),inset 0 0 20px rgba(0,245,255,0.05);position:relative;overflow:hidden;}
.summary-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon-blue),transparent);}
.summary-box h2{color:var(--neon-blue);font-family:'Orbitron',sans-serif;font-size:1rem;margin-bottom:15px;letter-spacing:2px;text-transform:uppercase;}
.summary-box p{color:#ccc;line-height:1.8;font-size:1.1rem;}
.news-grid{display:grid;gap:30px;}
.news-card{background:var(--card-bg);border:1px solid rgba(0,245,255,0.2);border-radius:20px;overflow:hidden;position:relative;transition:all 0.4s cubic-bezier(0.4,0,0.2,1);}
.news-card:hover{transform:translateY(-8px);border-color:var(--neon-blue);box-shadow:0 20px 60px rgba(0,245,255,0.2);}
.card-glow{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,rgba(0,245,255,0.1) 0%,transparent 50%,rgba(255,107,157,0.1) 100%);opacity:0;transition:opacity 0.4s;pointer-events:none;}
.news-card:hover .card-glow{opacity:1;}
.news-image{width:100%;height:220px;object-fit:cover;border-bottom:1px solid rgba(0,245,255,0.1);}
.news-content{padding:28px;}
.news-tag{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.75rem;font-weight:600;text-transform:uppercase;margin-bottom:15px;letter-spacing:1px;border:1px solid;}
.tag-crisis{background:rgba(255,0,0,0.1);color:#ff4444;border-color:rgba(255,0,0,0.3);}
.tag-security{background:rgba(255,0,0,0.1);color:#ff4444;border-color:rgba(255,0,0,0.3);}
.tag-update{background:rgba(0,245,255,0.1);color:var(--neon-blue);border-color:rgba(0,245,255,0.3);}
.tag-trend{background:rgba(0,255,136,0.1);color:#00ff88;border-color:rgba(0,255,136,0.3);}
.tag-strategy{background:rgba(255,107,157,0.1);color:var(--neon-pink);border-color:rgba(255,107,157,0.3);}
.tag-default{background:rgba(255,255,255,0.05);color:#888;border-color:rgba(255,255,255,0.2);}
.news-title{font-size:1.3rem;color:#fff;margin-bottom:15px;line-height:1.5;font-weight:600;}
.news-summary{color:#aaa;line-height:1.8;margin-bottom:20px;font-size:0.95rem;}
.news-meta{display:flex;justify-content:space-between;align-items:center;font-size:0.85rem;color:#666;padding-top:15px;border-top:1px solid rgba(255,255,255,0.1);}
.meta-source{color:var(--neon-pink);}
.meta-date{color:#666;}
.news-link{color:var(--neon-blue);text-decoration:none;font-weight:500;display:flex;align-items:center;gap:6px;transition:all 0.3s;}
.news-link:hover{color:var(--neon-pink);gap:10px;}
.footer{text-align:center;margin-top:60px;color:#666;font-size:0.9rem;font-family:'Orbitron',monospace;letter-spacing:2px;}
.footer span{color:var(--neon-blue);}
@media (max-width:600px){.header h1{font-size:1.8rem;letter-spacing:2px;}.news-title{font-size:1.1rem;}.cat-avatar{width:80px;height:80px;font-size:48px;}}
</style>
</head>
<body>

          </div>
        </div>
      </article>
</div>
<footer class="footer"><p>黑猫的AI每日报 · 每日更新</p></footer>
</div>
</body>
</html>
